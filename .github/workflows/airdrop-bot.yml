name: Interlink Multi Bot

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  multi-claim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Clone Multi Bot
        run: git clone https://github.com/cryptodai3/Interlink-Multi-Bot.git
        
      - name: Create accounts.txt
        run: |
          cd Interlink-Multi-Bot
          echo "${{ secrets.INTERLINK_EMAIL }}:${{ secrets.INTERLINK_PASSCODE }}" > accounts.txt
          
      - name: Install dependencies
        run: |
          cd Interlink-Multi-Bot
          npm install
          
      - name: Run multi bot
        run: |
          cd Interlink-Multi-Bot
          node index.js
