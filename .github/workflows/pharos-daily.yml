name: Pharos Daily Check-in (GM)

on:
  schedule:
    - cron: '0 0 * * *'      # Setiap hari jam 00:00 UTC
    - cron: '0 12 * * *'     # Juga jam 12:00 UTC (2x sehari)
  workflow_dispatch:

jobs:
  pharos-gm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Run Pharos Daily Check-in
        env:
          PHAROS_PRIVATE_KEY: ${{ secrets.PHAROS_PRIVATE_KEY }}
        run: node scripts/pharos-daily.js
