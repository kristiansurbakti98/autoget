name: Interlink Airdrop Claimer

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Clone Interlink Bot
        run: git clone https://github.com/vikitoshi/Interlink-Auto-Bot.git
      - name: Install dependencies
        run: |
          cd Interlink-Auto-Bot
          npm install
      - name: Run claimer
        env:
          EMAIL: ${{ secrets.INTERLINK_EMAIL }}
          PASSWORD: ${{ secrets.INTERLINK_PASS }}
        run: |
          cd Interlink-Auto-Bot
          node index.js
